"$schema" = 'https://starship.rs/config-schema.json'
command_timeout = 5000
palette = "catppuccin_macchiato"

format = """­şĞĞ # $username @ $hostname$custom$directory$git_branch$git_status$time$line_break$character"""

[username]
show_always = true
format = "[$user](bold peach)"

[hostname]
ssh_only = true
format = "[$hostname](bold mauve) in "

[custom.local]
command = "echo local"
when = "test -z \"$SSH_CONNECTION\""
format = "[$output](bold mauve) in "


[directory]
format = "[$path](bold green) "
truncation_length = 2
style = "bold green"

[git_branch]
format = "on [$symbol$branch](bold mauve) "
symbol = "´Éİ "
style = "bold mauve"

[time]
disabled = false
format = "\\[[$time](dimmed)\\]"
time_format = "%H:%M:%S"

