source-file ~/.config/tmux/keybinds.conf

# ── Terminal ──────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",xterm-ghostty:Tc"
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g default-shell /bin/zsh

# ── General ───────────────────────────────────
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set -g detach-on-destroy off
set -g escape-time 0
set -g repeat-time 750
set -g prefix-timeout 5000
set -g history-limit 1000000
set -g set-clipboard on
set -g mouse on


# ── Vi mode ───────────────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Status bar ────────────────────────────────
set -g status-position bottom
set -g pane-border-status bottom
set -g pane-border-format " "
set -g status "on"
set -g status-justify "absolute-centre"
set -g status-style "none,bg=default"
set -g status-left-style "none"
set -g status-left-length "100"
set -g status-right-style "none"
set -g status-right-length "100"
setw -g window-status-activity-style "none"
setw -g window-status-separator " "
setw -g window-status-style "none,fg=#868cad,bg=default"
setw -g window-status-current-style "none,fg=#ffffff,bg=default"
set -g status-left "#{?client_prefix,#[fg=#252b37]#[bg=#cba6f7]#[bold] #S #[fg=#ffb473]#[bg=default],#[fg=#ffb473]#[bg=default]#[bold] #S }#[fg=brightwhite,bg=default,nobold,nounderscore,noitalics]"
set -g status-right "#($HOME/.local/bin/tmux-sysstat) #[fg=#5de4c7]│ #[fg=#ffffff]#(LC_TIME=C date '+%%I:%%M %%p')  %d/%m/%Y "
set -g window-status-format '#{?#{m/r:cba6f7|ffb473|96b2ea,#{window-status-style}},#[fg=#252b37],#[fg=#5fb3a1]}#{?window_zoomed_flag, #[fg=#ffb473][#I]#[default], #I}#{?#{m/r:cba6f7|ffb473|96b2ea,#{window-status-style}},#[fg=#252b37],#[fg=#868cad]} #W#{?#{m/r:^(fish|bash|zsh|sh|less|more|cat|claude|codex|cursor-cli)$,#{pane_current_command}},,#{?#{m/r:^(nvim|vim|code|cursor)$,#{pane_current_command}}, ⌨️,:#{pane_current_command}}} '
set -g window-status-current-format '#{?#{m/r:cba6f7|ffb473|96b2ea,#{window-status-current-style}},#[fg=#252b37],#[fg=#5de4c7]}#{?window_zoomed_flag, #[fg=#ffb473][#I]#[default], #I}#{?#{m/r:cba6f7|ffb473|96b2ea,#{window-status-current-style}},#[fg=#252b37],#[fg=#ffffff]} #W#{?#{m/r:^(fish|bash|zsh|sh|less|more|cat|claude|codex|cursor-cli)$,#{pane_current_command}},,#{?#{m/r:^(nvim|vim|code|cursor)$,#{pane_current_command}}, ⌨️,:#{pane_current_command}}} '
set -g status-interval 5

# ── Theme ─────────────────────────────────────
source-file ~/.config/tmux/themes/poimandres-storm.conf

# Optional employer or machine overlay.
if-shell '[ -f ~/.config/tmux/local.conf ]' 'source-file ~/.config/tmux/local.conf'

# ── tmux-sessionx ─────────────────────────────
set -g @sessionx-bind 'o'
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-bind-kill-session 'ctrl-k'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '~/dotfiles'
set -g @sessionx-x-path '~/dotfiles'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

# ── Resurrect / Continuum ─────────────────────
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @catppuccin_flavour 'mocha'

# Agent indicator state is visible in panes/windows; keep tmux's message bar quiet.
set -g @agent-indicator-notification-enabled 'off'
set -g @agent-indicator-animation-enabled 'off'
set -g @agent-indicator-animation-speed '180'

# ── Plugins ───────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'timvw/tmux-assistant-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'accessd/tmux-agent-indicator'

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
