# Rose Pine.

# Pane borders
set -g pane-border-style "fg=#2f2c40"
set -g pane-active-border-style "fg=#ebbcba"

# tmux-dotbar
set -g @tmux-dotbar-bg "#1f1d2e"
set -g @tmux-dotbar-fg "#908caa"
set -g @tmux-dotbar-fg-current "#e0def4"
set -g @tmux-dotbar-fg-session "#31748f"
set -g @tmux-dotbar-fg-prefix "#f6c177"
set -g @tmux-dotbar-status-right "#[bg=#1f1d2e,fg=#908caa] %H:%M "

# Agent indicator
set -g @agent-indicator-needs-input-border '#f6c177'
set -g @agent-indicator-needs-input-window-title-bg '#f6c177'
set -g @agent-indicator-needs-input-window-title-fg '#1f1d2e,bold'
set -g @agent-indicator-done-border '#c4a7e7'
set -g @agent-indicator-done-window-title-bg '#c4a7e7'
set -g @agent-indicator-done-window-title-fg '#1f1d2e,bold'
