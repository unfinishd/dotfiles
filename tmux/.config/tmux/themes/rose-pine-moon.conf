# Rose Pine Moon.

# Pane borders
set -g pane-border-style "fg=#37344d"
set -g pane-active-border-style "fg=#ea9a97"

# tmux-dotbar
set -g @tmux-dotbar-bg "#2a273f"
set -g @tmux-dotbar-fg "#908caa"
set -g @tmux-dotbar-fg-current "#e0def4"
set -g @tmux-dotbar-fg-session "#3e8fb0"
set -g @tmux-dotbar-fg-prefix "#f6c177"
set -g @tmux-dotbar-status-right "#[bg=#2a273f,fg=#908caa] %H:%M "

# Agent indicator
set -g @agent-indicator-needs-input-border '#f6c177'
set -g @agent-indicator-needs-input-window-title-bg '#f6c177'
set -g @agent-indicator-needs-input-window-title-fg '#2a273f,bold'
set -g @agent-indicator-done-border '#c4a7e7'
set -g @agent-indicator-done-window-title-bg '#c4a7e7'
set -g @agent-indicator-done-window-title-fg '#2a273f,bold'
