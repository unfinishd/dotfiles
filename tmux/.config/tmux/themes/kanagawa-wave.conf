# Kanagawa Wave.

# Pane borders
set -g pane-border-style "fg=#2d4f67"
set -g pane-active-border-style "fg=#7aa89f"

# tmux-dotbar
set -g @tmux-dotbar-bg "#1f1f28"
set -g @tmux-dotbar-fg "#727169"
set -g @tmux-dotbar-fg-current "#dcd7ba"
set -g @tmux-dotbar-fg-session "#98bb6c"
set -g @tmux-dotbar-fg-prefix "#e6c384"
set -g @tmux-dotbar-status-right "#[bg=#1f1f28,fg=#727169] %H:%M "

# Agent indicator
set -g @agent-indicator-needs-input-border '#e6c384'
set -g @agent-indicator-needs-input-window-title-bg '#e6c384'
set -g @agent-indicator-needs-input-window-title-fg '#1f1f28,bold'
set -g @agent-indicator-done-border '#957fb8'
set -g @agent-indicator-done-window-title-bg '#957fb8'
set -g @agent-indicator-done-window-title-fg '#1f1f28,bold'
