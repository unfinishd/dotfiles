# Catppuccin Mocha.

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#94e2d5"

# tmux-dotbar
set -g @tmux-dotbar-bg "#1e1e2e"
set -g @tmux-dotbar-fg "#585b70"
set -g @tmux-dotbar-fg-current "#cdd6f4"
set -g @tmux-dotbar-fg-session "#a6adc8"
set -g @tmux-dotbar-fg-prefix "#f5c2e7"
set -g @tmux-dotbar-status-right "#[bg=#1e1e2e,fg=#a6adc8] %H:%M "

# Agent indicator
set -g @agent-indicator-needs-input-border '#f9e2af'
set -g @agent-indicator-needs-input-window-title-bg '#f9e2af'
set -g @agent-indicator-needs-input-window-title-fg '#1e1e2e,bold'
set -g @agent-indicator-done-border '#f5c2e7'
set -g @agent-indicator-done-window-title-bg '#f5c2e7'
set -g @agent-indicator-done-window-title-fg '#1e1e2e,bold'
