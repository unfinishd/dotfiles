# Dracula.

# Pane borders
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"

# tmux-dotbar
set -g @tmux-dotbar-bg "#282a36"
set -g @tmux-dotbar-fg "#6272a4"
set -g @tmux-dotbar-fg-current "#f8f8f2"
set -g @tmux-dotbar-fg-session "#8be9fd"
set -g @tmux-dotbar-fg-prefix "#ff79c6"
set -g @tmux-dotbar-status-right "#[bg=#282a36,fg=#6272a4] %H:%M "

# Agent indicator
set -g @agent-indicator-needs-input-border '#f1fa8c'
set -g @agent-indicator-needs-input-window-title-bg '#f1fa8c'
set -g @agent-indicator-needs-input-window-title-fg '#282a36,bold'
set -g @agent-indicator-done-border '#50fa7b'
set -g @agent-indicator-done-window-title-bg '#50fa7b'
set -g @agent-indicator-done-window-title-fg '#282a36,bold'
