# ── Prefix ────────────────────────────────────
# Backtick (mapped to Caps Lock via Karabiner)
unbind C-b
set -g prefix `
bind ` send-prefix

# ── Config ────────────────────────────────────
bind R source-file ~/.tmux.conf \; display "Config reloaded"

# ── Pane navigation (vim keys, repeatable) ────
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ── Pane management ───────────────────────────
bind s split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"
bind c kill-pane
bind = select-layout -E
bind -r tab select-pane -t +
bind -r BTab select-pane -t -
bind -r '{' swap-pane -U
bind -r '}' swap-pane -D
bind * setw synchronize-panes
bind ! break-pane
bind @ command-prompt -p "send pane to window:" "join-pane -t :'%%'"
bind M select-pane -m
bind -r Space next-layout

# ── Pane resize (vim keys, repeatable) ────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window navigation ─────────────────────────
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -r n next-window
bind -r p previous-window
bind ^A last-window

# ── Window management ─────────────────────────
bind w new-window -a -c "#{pane_current_path}"
bind C kill-window
bind r command-prompt "rename-window %%"
bind -r < if-shell -F '#{!=:#{window_index},1}' 'swap-window -t -1; previous-window'
bind -r > if-shell -F '#{!=:#{window_index},#{session_windows}}' 'swap-window -t +1; next-window'
bind W choose-window
bind m choose-tree -s "move-window -t '%%'"

# ── Session management ────────────────────────
bind -r ( switch-client -p
bind -r ) switch-client -n
bind S choose-tree -s

# ── Search ────────────────────────────────────
bind / copy-mode \; send-keys ?

# ── Pass-through keys ────────────────────────
bind -n S-Enter send-keys Escape "[13;2u"

# ── Misc ──────────────────────────────────────
bind : command-prompt
